services:
  db:
    image: postgres:15-alpine
    container_name: mega_ai_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-mega_ai}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ..            # Critical: Point to the root directory
      dockerfile: docker/Dockerfile
    container_name: mega_ai_api
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/mega_ai
      - OLLAMA_BASE_URL=http://host.docker.internal:11434 # For local-first AI
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway" # Allows Docker to talk to your local Ollama

volumes:
  postgres_data: